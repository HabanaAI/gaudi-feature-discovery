---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: habanalabs-feature-discovery-sa

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: habanalabs-feature-discovery-cr
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["nodes"]
  verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: habanalabs-feature-discovery-crole-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: habanalabs-feature-discovery-cr
subjects:
- kind: ServiceAccount
  name: habanalabs-feature-discovery-sa

